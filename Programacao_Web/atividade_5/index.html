<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca de CEP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Busca de CEP</h1>
      <p>Atividade de Programação Web com consumo de API</p>
    </header>

    <main class="card">
      <form id="formCep">
        <label for="cep">Digite o CEP</label>
        <input
          type="text"
          id="cep"
          maxlength="9"
          placeholder="Ex.: 90000-000"
        />
        <button type="submit">Buscar</button>
      </form>

      <p id="mensagem" class="mensagem"></p>

      <section id="resultado" class="resultado oculto">
        <h2>Endereço encontrado</h2>
        <p><strong>Logradouro:</strong> <span id="logradouro"></span></p>
        <p><strong>Bairro:</strong> <span id="bairro"></span></p>
        <p><strong>Cidade:</strong> <span id="cidade"></span></p>
        <p><strong>Estado:</strong> <span id="estado"></span></p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
