<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produtos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Cadastro de Produtos</h1>
      <p>Atividade de Programação Web com HTML, CSS e JavaScript</p>
    </header>

    <main>
      <section class="form-section">
        <h2 id="tituloFormulario">Novo Produto</h2>

        <form id="formProduto">
          <div class="campo">
            <label for="nome">Nome do produto</label>
            <input type="text" id="nome" placeholder="Digite o nome do produto" />
          </div>

          <div class="campo">
            <label for="preco">Preço</label>
            <input type="number" id="preco" placeholder="Digite o preço" step="0.01" min="0" />
          </div>

          <div class="campo">
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" placeholder="Digite a categoria" />
          </div>

          <button type="submit" id="btnSalvar">Cadastrar Produto</button>
          <button type="button" id="btnCancelar" class="btn-cancelar oculto">Cancelar Edição</button>
        </form>

        <p id="mensagem" class="mensagem"></p>
      </section>

      <section class="list-section">
        <h2>Produtos Cadastrados</h2>
        <ul id="listaProdutos"></ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
